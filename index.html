<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N5 Kanji Flashcards</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f6f8; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #333; margin-bottom: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; width: 100%; max-width: 600px; }
        .card { background: white; padding: 10px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; cursor: pointer; }
        .card img { width: 100%; height: 120px; object-fit: contain; border-radius: 8px; }
        .kanji-title { font-size: 20px; font-weight: bold; margin-top: 8px; color: #2c3e50; }
        .meaning { font-size: 14px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>

    <h1>N5 Kanji Cards</h1>
    <div class="grid" id="card-container">Loading...</div>

    <script>
        Papa.parse('data.csv', {
            download: true,
            header: true,
            complete: function(results) {
                let container = document.getElementById('card-container');
                container.innerHTML = '';
                results.data.forEach(row => {
                    if(row['1'] || row['Meaning/sinhala']) {
                        let card = document.createElement('div');
                        card.className = 'card';
                        
                        let imgUrl = row['Stroke Order Image URL (For Glide)'] || '';
                        let kanji = row['1'] || '';
                        let sinhala = row['Meaning/sinhala'] || '';
                        
                        card.innerHTML = `
                            ${imgUrl ? `<img src="${imgUrl}" alt="${kanji}">` : ''}
                            <div class="kanji-title">${kanji}</div>
                            <div class="meaning">${sinhala}</div>
                        `;
                        container.appendChild(card);
                    }
                });
            }
        });
    </script>
</body>
</html>
